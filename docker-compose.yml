version: "3.9"

services:
  python-service:
    build:
      context: ./python-service
      dockerfile: Dockerfile
    container_name: farmer-python
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - PORT=8000
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 15s
      timeout: 5s
      retries: 3

  node-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: farmer-node
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - PYTHON_SERVICE_URL=http://python-service:8000
    depends_on:
      python-service:
        condition: service_healthy
